# ─────────────────────────────────────────────────────────────────────────────
#  /etc/nginx/conf.d/green.conf
#
#  Active when the symlink points to this file:
#    /etc/nginx/conf.d/active.conf -> /etc/nginx/conf.d/green.conf
#
#  Proxies all traffic to the green container on port 3002.
# ─────────────────────────────────────────────────────────────────────────────

upstream app_upstream {
    server 127.0.0.1:3002;   # Green container port
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Deployment slot identifier ────────────────────────────────────────────
    add_header X-Deploy-Slot "green" always;

    # ── Proxy settings ────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Upgrade         $http_upgrade;
    proxy_set_header   Connection      "upgrade";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Buffer settings ───────────────────────────────────────────────────────
    proxy_buffering       on;
    proxy_buffer_size     4k;
    proxy_buffers         8 4k;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript;
    gzip_min_length   1000;

    # ── Routes ────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://app_upstream;
    }

    # Health-check endpoint – bypass proxy buffers for faster CI response
    location /health {
        proxy_pass            http://app_upstream;
        proxy_read_timeout    5s;
        access_log            off;
    }

    # ── Static asset cache ────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        proxy_pass http://app_upstream;
        expires    7d;
        add_header Cache-Control "public, immutable";
    }
}
