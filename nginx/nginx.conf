# ─────────────────────────────────────────────────────────────────────────────
#  /etc/nginx/nginx.conf  –  Main Nginx Configuration
#  Hardened for production. Drop-in for Amazon Linux 2023.
# ─────────────────────────────────────────────────────────────────────────────

user nginx;

# Auto-detect CPU cores
worker_processes auto;

# Maximum open files per worker
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Log format ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time slot=$upstream_http_x_deploy_slot';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # Hide Nginx version

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── Include vhost configs (active.conf symlink lives here) ────────────────
    include /etc/nginx/conf.d/active.conf;
}
