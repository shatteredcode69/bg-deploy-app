# ─────────────────────────────────────────────────────────────────────────────
#  .github/workflows/main.yml
#  Blue-Green Zero-Downtime CI/CD Pipeline
#
#  Triggers: push to main  |  manual workflow_dispatch
#
#  Secrets required (Settings → Secrets and Variables → Actions):
#    AWS_ACCESS_KEY_ID       – IAM user key ID
#    AWS_SECRET_ACCESS_KEY   – IAM user secret
#    AWS_REGION              – e.g. us-east-1
#    AWS_ACCOUNT_ID          – 12-digit account ID
#    ECR_REPO                – ECR repository name (e.g. bg-deploy-app)
#    EC2_HOST                – public IP or DNS of the EC2 instance
#    EC2_USER                – SSH user (ec2-user for Amazon Linux)
#    EC2_SSH_KEY             – PEM private key (multi-line secret)
# ─────────────────────────────────────────────────────────────────────────────

name: Blue-Green Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_slot:
        description: "Force target slot (blue|green|auto)"
        required: false
        default: "auto"

# Prevent parallel deployments on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel in-flight deployments

env:
  AWS_REGION    : ${{ secrets.AWS_REGION }}
  ECR_REGISTRY  : ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPO      : ${{ secrets.ECR_REPO }}
  IMAGE_TAG     : ${{ github.sha }}
  APP_VERSION   : ${{ github.ref_name }}-${{ github.run_number }}

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  #  JOB 1 – Build, tag, and push to ECR
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "① Build & Push to ECR"
    runs-on: ubuntu-latest

    outputs:
      image_tag   : ${{ env.IMAGE_TAG }}
      app_version : ${{ env.APP_VERSION }}
      ecr_registry: ${{ env.ECR_REGISTRY }}

    steps:

      - name: "Checkout source"
        uses: actions/checkout@v4

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id     : ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region            : ${{ env.AWS_REGION }}

      - name: "Log in to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Set up Docker Buildx (for layer caching)"
        uses: docker/setup-buildx-action@v3

      - name: "Build, tag & push Docker image"
        uses: docker/build-push-action@v5
        with:
          context  : .
          file     : Dockerfile
          push     : true
          tags     : |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          # Inline layer caching – dramatically speeds up rebuilds
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:buildcache
          cache-to  : type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:buildcache,mode=max

      - name: "Scan image for vulnerabilities (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref      : "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          format         : table
          exit-code      : "0"          # warn only; change to 1 to block on HIGH/CRITICAL
          severity       : "CRITICAL,HIGH"
          ignore-unfixed : true

  # ───────────────────────────────────────────────────────────────────────────
  #  JOB 2 – Deploy to EC2 (blue-green switch)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: "② Deploy (Zero-Downtime)"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production    # requires manual approval if configured

    steps:

      - name: "Checkout source (for deploy.sh)"
        uses: actions/checkout@v4

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id     : ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region            : ${{ env.AWS_REGION }}

      - name: "Write SSH key to file"
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key

      - name: "Copy deploy.sh to EC2"
        run: |
          scp -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              deploy.sh \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy.sh

      - name: "Run blue-green deployment on EC2"
        id: deploy-step
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "chmod +x /tmp/deploy.sh && bash /tmp/deploy.sh \
                '${{ needs.build-and-push.outputs.ecr_registry }}' \
                '${{ env.ECR_REPO }}' \
                '${{ needs.build-and-push.outputs.image_tag }}' \
                '${{ needs.build-and-push.outputs.app_version }}'"

      - name: "Post-deploy smoke test (via Nginx)"
        run: |
          echo "⏳ Waiting 5s for Nginx to reload …"
          sleep 5

          echo "🔍 Probing /health via Nginx (port 80) …"
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "http://${{ secrets.EC2_HOST }}/health" || echo "000")

          echo "HTTP status: ${HTTP_CODE}"

          if [[ "${HTTP_CODE}" != "200" ]]; then
            echo "❌ Smoke test FAILED – HTTP ${HTTP_CODE}"
            exit 1
          fi

          echo "✅ Smoke test passed – deployment is live."

      - name: "Clean up SSH key"
        if: always()
        run: rm -f /tmp/deploy_key

      - name: "Notify on failure"
        if: failure()
        run: |
          echo "::error::Deployment failed for ${{ env.IMAGE_TAG }}. Check the logs above."
          # ── Extend here: Slack/SNS/PagerDuty webhook ──────────────────────

  # ───────────────────────────────────────────────────────────────────────────
  #  JOB 3 – Post-deploy summary
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "③ Deployment Summary"
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()

    steps:
      - name: "Write job summary"
        run: |
          echo "## 🚀 Blue-Green Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo ""                                     >> $GITHUB_STEP_SUMMARY
          echo "| Field         | Value |"            >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|"            >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag     | \`${{ needs.build-and-push.outputs.image_tag }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| App Version   | \`${{ needs.build-and-push.outputs.app_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Registry  | \`${{ needs.build-and-push.outputs.ecr_registry }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By  | @${{ github.actor }} |"                                 >> $GITHUB_STEP_SUMMARY
          echo "| Commit        | \`${{ github.sha }}\` |"                               >> $GITHUB_STEP_SUMMARY
          echo "| Branch        | \`${{ github.ref_name }}\` |"                          >> $GITHUB_STEP_SUMMARY
          echo "| Build Status  | ${{ needs.build-and-push.result }} |"                   >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Status | ${{ needs.deploy.result }} |"                           >> $GITHUB_STEP_SUMMARY
